# Daily ping that does two jobs at once:
#  1. Keeps the free-tier Supabase project from pausing for inactivity.
#  2. Runs the account-lifecycle job (inactivity warnings + 6-month deletions).
# Needs repo secrets: SUPABASE_URL, LIFECYCLE_SECRET (must match the value set
# with `supabase secrets set LIFECYCLE_SECRET=...`).

name: Daily lifecycle & keep-alive
on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily (odd minute avoids the on-the-hour rush)
  workflow_dispatch: {}     # allow manual runs for testing

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call the lifecycle edge function
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/lifecycle" \
            -H "x-lifecycle-secret: ${{ secrets.LIFECYCLE_SECRET }}" \
            | tee result.json
          echo "Lifecycle summary: $(cat result.json)"
